<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Only One Delivery</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: #f5f0e8;
  color: #1a1a1a;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  min-height: 100vh;
}

.container {
  text-align: center;
  max-width: 480px;
  width: 100%;
}

.brand {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 4px;
  margin-bottom: 8px;
  color: #1a1a1a;
}

.brand-sub {
  font-size: 11px;
  letter-spacing: 4px;
  color: #888;
  margin-bottom: 80px;
}

.divider {
  width: 40px;
  height: 1px;
  background: rgba(0,0,0,0.2);
  margin: 0 auto 48px;
}

.message-main {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 22px;
  line-height: 2;
  margin-bottom: 32px;
  color: #1a1a1a;
}

.message-sub {
  font-size: 14px;
  line-height: 2;
  color: #666;
  margin-bottom: 48px;
}

.brand-bottom {
  margin-top: 80px;
  font-size: 11px;
  color: #999;
  letter-spacing: 2px;
}

@media (max-width: 480px) {
  .brand {
    font-size: 22px;
    letter-spacing: 3px;
  }
  .brand-sub {
    font-size: 10px;
    margin-bottom: 60px;
  }
  .message-main {
    font-size: 18px;
  }
  .message-sub {
    font-size: 13px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="brand">Only One Delivery</div>
  <div class="brand-sub">一 生 忘 れ な い 、ギ フ ト</div>

  <div class="divider"></div>

  <div class="message-main">
    ただいま、<br>
    サービス改善のため、<br>
    一時休止しております。
  </div>

  <div class="message-sub">
    近日、新しい体験で<br>
    再開いたします。
  </div>

  <div class="brand-bottom">ONLY ONE DELIVERY</div>
</div>
</body>
</html>
